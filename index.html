<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Transport</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 400px; margin: 0 auto; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #2563eb; color: white; border: none; cursor: pointer; }
        .hidden { display: none; }
        #errorMsg { color: red; margin: 10px 0; }
        #status { color: #666; font-size: 0.9em; margin: 10px 0; padding: 10px; background: #f5f5f5; border-radius: 4px; }
        .success { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🚌 School Transport</h1>
    
    <div id="status">Loading Firebase...</div>
    <div id="scriptStatus"></div>
    
    <div id="loginSection" class="hidden">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login</button>
        <div id="errorMsg"></div>
    </div>

    <div id="dashboardSection" class="hidden">
        <h2 id="welcomeMsg"></h2>
        <button onclick="logout()">Logout</button>
    </div>

    <script>
        (function() {
            const statusEl = document.getElementById('status');
            const scriptStatus = document.getElementById('scriptStatus');
            
            // Load scripts one by one and track them
            const scripts = [
                'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js',
                'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js',
                'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js'
            ];
            
            let loadedCount = 0;
            
            function loadScript(index) {
                if (index >= scripts.length) {
                    statusEl.innerHTML = '✅ All scripts loaded. Initializing...';
                    setTimeout(initializeApp, 500);
                    return;
                }
                
                const script = document.createElement('script');
                script.src = scripts[index];
                script.onload = () => {
                    loadedCount++;
                    scriptStatus.innerHTML = `📦 Loaded: ${scripts[index].split('/').pop()} (${loadedCount}/${scripts.length})`;
                    loadScript(index + 1);
                };
                script.onerror = () => {
                    scriptStatus.innerHTML = `❌ Failed to load: ${scripts[index].split('/').pop()}`;
                    // Try next anyway
                    loadScript(index + 1);
                };
                document.head.appendChild(script);
            }
            
            // Start loading
            loadScript(0);
            
            function initializeApp() {
                try {
                    // Check if Firebase is fully loaded
                    if (typeof firebase === 'undefined') {
                        statusEl.innerHTML = '❌ Firebase not available';
                        return;
                    }
                    
                    if (!firebase.auth) {
                        statusEl.innerHTML = '❌ Firebase Auth not loaded. Retrying...';
                        setTimeout(initializeApp, 1000);
                        return;
                    }
                    
                    const firebaseConfig = {
                        apiKey: "AIzaSyCS163x5b5-MJXxJGwbjE0IlO7R58CkJMg",
                        authDomain: "maktab-transport.firebaseapp.com",
                        projectId: "maktab-transport",
                        storageBucket: "maktab-transport.firebasestorage.app",
                        messagingSenderId: "575357634901",
                        appId: "1:575357634901:web:4918fb77b0c21965af07dc"
                    };

                    // Initialize Firebase
                    if (!firebase.apps.length) {
                        firebase.initializeApp(firebaseConfig);
                    }
                    
                    const auth = firebase.auth();
                    
                    statusEl.innerHTML = '✅ Firebase ready!';
                    statusEl.classList.add('success');
                    
                    // Show login section
                    document.getElementById('loginSection').classList.remove('hidden');
                    
                    // Login handler
                    document.getElementById('loginBtn').onclick = async () => {
                        const email = document.getElementById('email').value;
                        const password = document.getElementById('password').value;
                        
                        if (!email || !password) {
                            document.getElementById('errorMsg').innerText = 'Please enter email and password';
                            return;
                        }
                        
                        try {
                            statusEl.innerHTML = '🔄 Logging in...';
                            await auth.signInWithEmailAndPassword(email, password);
                        } catch (e) {
                            document.getElementById('errorMsg').innerText = e.message;
                            statusEl.innerHTML = '❌ Login failed';
                        }
                    };

                    // Auth state
                    auth.onAuthStateChanged(user => {
                        if (user) {
                            document.getElementById('loginSection').classList.add('hidden');
                            document.getElementById('dashboardSection').classList.remove('hidden');
                            document.getElementById('welcomeMsg').innerText = `Welcome ${user.email}`;
                            statusEl.classList.add('hidden');
                        } else {
                            document.getElementById('loginSection').classList.remove('hidden');
                            document.getElementById('dashboardSection').classList.add('hidden');
                        }
                    });

                    window.logout = () => auth.signOut();

                } catch (e) {
                    statusEl.innerHTML = '❌ Error: ' + e.message;
                    console.error(e);
                }
            }
        })();
    </script>
</body>
</html>
