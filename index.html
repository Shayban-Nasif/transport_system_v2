<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Transport</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 400px; margin: 0 auto; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; }
        .hidden { display: none; }
        #errorMsg { color: red; }
    </style>
</head>
<body>
    <h1>🚌 School Transport</h1>
    
    <div id="loginSection">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login</button>
        <div id="errorMsg"></div>
    </div>

    <div id="dashboardSection" class="hidden">
        <h2 id="welcomeMsg"></h2>
        <button onclick="logout()">Logout</button>
    </div>

    <!-- Load Firebase using multiple methods -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
    
    <script>
        // Wait for Firebase to load
        function waitForFirebase() {
            return new Promise((resolve) => {
                if (window.firebase) {
                    resolve();
                    return;
                }
                
                // Check every 100ms
                const interval = setInterval(() => {
                    if (window.firebase) {
                        clearInterval(interval);
                        resolve();
                    }
                }, 100);
                
                // Timeout after 5 seconds
                setTimeout(() => {
                    clearInterval(interval);
                    resolve(); // Resolve anyway, let it fail gracefully
                }, 5000);
            });
        }

        // Initialize app
        (async function() {
            await waitForFirebase();
            
            if (!window.firebase) {
                document.getElementById('errorMsg').innerText = 'Firebase failed to load. Please refresh.';
                return;
            }

            // Firebase Config
            const firebaseConfig = {
                apiKey: "AIzaSyCS163x5b5-MJXxJGwbjE0IlO7R58CkJMg",
                authDomain: "maktab-transport.firebaseapp.com",
                projectId: "maktab-transport",
                storageBucket: "maktab-transport.firebasestorage.app",
                messagingSenderId: "575357634901",
                appId: "1:575357634901:web:4918fb77b0c21965af07dc"
            };

            // Initialize
            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            
            console.log('✅ Firebase ready');

            // Login
            document.getElementById('loginBtn').onclick = async () => {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                } catch (e) {
                    document.getElementById('errorMsg').innerText = e.message;
                }
            };

            // Auth state
            auth.onAuthStateChanged(user => {
                if (user) {
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('dashboardSection').classList.remove('hidden');
                    document.getElementById('welcomeMsg').innerText = `Welcome ${user.email}`;
                } else {
                    document.getElementById('loginSection').classList.remove('hidden');
                    document.getElementById('dashboardSection').classList.add('hidden');
                }
            });

            window.logout = () => auth.signOut();
        })();
    </script>
</body>
</html>
