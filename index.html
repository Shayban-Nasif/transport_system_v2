<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Transport</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 400px; margin: 0 auto; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #2563eb; color: white; border: none; cursor: pointer; }
        .hidden { display: none; }
        #errorMsg { color: red; margin: 10px 0; }
        #status { color: #666; font-size: 0.9em; margin: 10px 0; padding: 10px; background: #f5f5f5; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>🚌 School Transport</h1>
    
    <div id="status">Loading Firebase...</div>
    
    <div id="loginSection" class="hidden">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">Login</button>
        <div id="errorMsg"></div>
    </div>

    <div id="dashboardSection" class="hidden">
        <h2 id="welcomeMsg"></h2>
        <button onclick="logout()">Logout</button>
    </div>

    <!-- Load Firebase using the most reliable CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

    <script>
        (function() {
            const statusEl = document.getElementById('status');
            let attempts = 0;
            const maxAttempts = 20;

            function updateStatus(message) {
                console.log(message);
                statusEl.textContent = message;
            }

            function checkFirebase() {
                attempts++;
                
                if (typeof firebase !== 'undefined' && firebase.app) {
                    updateStatus('✅ Firebase loaded! Initializing...');
                    initializeApp();
                    return true;
                }
                
                if (attempts >= maxAttempts) {
                    updateStatus('❌ Firebase failed to load. Using fallback...');
                    useFallback();
                    return false;
                }
                
                updateStatus(`Waiting for Firebase... (attempt ${attempts}/${maxAttempts})`);
                setTimeout(checkFirebase, 500);
            }

            function useFallback() {
                // Create a mock auth for testing
                window.firebase = {
                    initializeApp: function() { 
                        console.log('Fallback mode active');
                        return { 
                            auth: () => ({
                                signInWithEmailAndPassword: async (email, password) => {
                                    updateStatus('✅ Demo mode: Login successful!');
                                    setTimeout(() => {
                                        document.getElementById('loginSection').classList.add('hidden');
                                        document.getElementById('dashboardSection').classList.remove('hidden');
                                        document.getElementById('welcomeMsg').innerText = `Welcome ${email} (Demo Mode)`;
                                        statusEl.classList.add('hidden');
                                    }, 500);
                                    return { user: { email, uid: '123' } };
                                },
                                onAuthStateChanged: (callback) => {
                                    // Call with null initially
                                    callback(null);
                                }
                            })
                        };
                    },
                    apps: []
                };
                
                initializeApp();
            }

            function initializeApp() {
                try {
                    const firebaseConfig = {
                        apiKey: "AIzaSyCS163x5b5-MJXxJGwbjE0IlO7R58CkJMg",
                        authDomain: "maktab-transport.firebaseapp.com",
                        projectId: "maktab-transport",
                        storageBucket: "maktab-transport.firebasestorage.app",
                        messagingSenderId: "575357634901",
                        appId: "1:575357634901:web:4918fb77b0c21965af07dc"
                    };

                    // Initialize Firebase
                    if (!firebase.apps.length) {
                        firebase.initializeApp(firebaseConfig);
                    }
                    
                    const auth = firebase.auth();
                    
                    updateStatus('✅ Ready to login');
                    statusEl.style.color = 'green';
                    
                    // Show login section
                    document.getElementById('loginSection').classList.remove('hidden');
                    
                    // Login handler
                    document.getElementById('loginBtn').onclick = async () => {
                        const email = document.getElementById('email').value;
                        const password = document.getElementById('password').value;
                        
                        if (!email || !password) {
                            document.getElementById('errorMsg').innerText = 'Please enter email and password';
                            return;
                        }
                        
                        try {
                            updateStatus('Logging in...');
                            await auth.signInWithEmailAndPassword(email, password);
                            updateStatus('Login successful!');
                        } catch (e) {
                            document.getElementById('errorMsg').innerText = e.message;
                            updateStatus('Login failed: ' + e.message);
                        }
                    };

                    // Auth state
                    auth.onAuthStateChanged(user => {
                        if (user) {
                            document.getElementById('loginSection').classList.add('hidden');
                            document.getElementById('dashboardSection').classList.remove('hidden');
                            document.getElementById('welcomeMsg').innerText = `Welcome ${user.email}`;
                            statusEl.classList.add('hidden');
                        } else {
                            document.getElementById('loginSection').classList.remove('hidden');
                            document.getElementById('dashboardSection').classList.add('hidden');
                        }
                    });

                    window.logout = () => auth.signOut();

                } catch (e) {
                    statusEl.textContent = '❌ Error: ' + e.message;
                    console.error(e);
                }
            }

            // Start checking
            setTimeout(checkFirebase, 100);
        })();
    </script>
</body>
</html>
